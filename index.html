<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>💊 Para ti Lu 💊</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

  :root{
    --bg1:#fce4ec;--bg2:#e8d5f5;--bg3:#d1e7ff;
    --machine-body:#7ecbc0;--machine-dark:#5baa9f;--machine-light:#a8e6cf;
    --dome:#e0f7fa;--dome-border:#b2dfdb;
    --pink:#f48fb1;--lilac:#ce93d8;--yellow:#fff176;--mint:#80cbc4;--coral:#ff8a80;--sky:#81d4fa;
    --gold:#ffd54f;--gold-dark:#ffb300;--gold-light:#fff8e1;
    --text:#4a4a5a;--text-light:#7a7a8a;
    --card-bg:#ffffffee;
  }

  html,body{
    height:100%;overflow:hidden;
    font-family:'Quicksand',sans-serif;color:var(--text);
    background:linear-gradient(160deg,var(--bg1) 0%,var(--bg2) 50%,var(--bg3) 100%);
    background-attachment:fixed;
  }

  /* ===== PARTICLES BG ===== */
  .bg-particles{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
  .bg-particles span{
    position:absolute;display:block;font-size:1rem;opacity:.25;
    animation:floatUp linear infinite;
  }
  @keyframes floatUp{
    0%{transform:translateY(100vh) rotate(0deg);opacity:0}
    10%{opacity:.25}
    90%{opacity:.25}
    100%{transform:translateY(-10vh) rotate(360deg);opacity:0}
  }

  /* ===== SCREENS ===== */
  .screen{
    position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;padding:1.5rem;
    transition:opacity .6s,transform .6s;z-index:1;
  }
  .screen.hidden{opacity:0;pointer-events:none;transform:scale(.95)}

  /* ===== WELCOME ===== */
  #welcome .emoji-top{font-size:3.5rem;margin-bottom:1rem;animation:bounce 2s infinite}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
  #welcome h1{font-size:1.5rem;font-weight:700;text-align:center;line-height:1.4;margin-bottom:.5rem;color:var(--text)}
  #welcome p{font-size:1rem;color:var(--text-light);text-align:center;margin-bottom:2rem}
  .btn-coin{
    background:linear-gradient(135deg,var(--gold),var(--gold-dark));
    border:none;border-radius:50px;padding:.9rem 2.2rem;
    font-family:inherit;font-size:1.1rem;font-weight:700;color:#5d4037;
    cursor:pointer;box-shadow:0 4px 20px #ffb30044;
    transition:transform .2s,box-shadow .2s;
    position:relative;overflow:hidden;
  }
  .btn-coin:active{transform:scale(.95)}
  .btn-coin::after{
    content:'';position:absolute;inset:0;
    background:linear-gradient(105deg,transparent 40%,#ffffff55 50%,transparent 60%);
    animation:shimmer 2.5s infinite;
  }
  @keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}

  /* ===== GAME SCREEN ===== */
  #game{gap:.5rem}
  .counter{font-size:.85rem;font-weight:600;color:var(--text-light);margin-bottom:.3rem;letter-spacing:.03em}

  /* ===== MACHINE ===== */
  .machine-wrapper{position:relative;width:260px;max-width:80vw;aspect-ratio:260/380;margin:0 auto}

  /* Dome */
  .dome{
    position:absolute;top:0;left:10%;width:80%;height:50%;
    background:radial-gradient(ellipse at 30% 30%,#ffffff88,var(--dome) 70%);
    border:4px solid var(--dome-border);
    border-radius:50% 50% 8px 8px;
    overflow:hidden;z-index:2;
  }
  .dome-shine{
    position:absolute;top:8%;left:12%;width:30%;height:25%;
    background:radial-gradient(ellipse,#ffffffaa,transparent);
    border-radius:50%;transform:rotate(-20deg);
  }

  /* Mini capsules inside dome */
  .mini-capsule{
    position:absolute;width:22px;height:28px;border-radius:50%;
    border:2px solid #ffffff66;
    transition:opacity .5s;
  }
  .mini-capsule.collected{opacity:.2;filter:grayscale(1)}

  /* Body */
  .machine-body{
    position:absolute;top:46%;left:5%;width:90%;height:42%;
    background:linear-gradient(180deg,var(--machine-body),var(--machine-dark));
    border-radius:12px;z-index:1;
    box-shadow:0 8px 30px #00000022;
  }
  .machine-label{
    position:absolute;top:15%;left:50%;transform:translateX(-50%);
    background:var(--gold);color:#5d4037;font-weight:700;font-size:.65rem;
    padding:.25rem .7rem;border-radius:4px;letter-spacing:.08em;
    text-transform:uppercase;white-space:nowrap;
  }

  /* Slot */
  .slot{
    position:absolute;bottom:0;left:50%;transform:translateX(-50%);
    width:55%;height:22%;
    background:linear-gradient(180deg,#333,#1a1a1a);
    border-radius:0 0 10px 10px;z-index:3;
    display:flex;align-items:center;justify-content:center;
  }
  .slot-opening{
    width:70%;height:45%;background:#0a0a0a;border-radius:6px;
    border-top:2px solid #444;
  }

  /* Lever */
  .lever-area{
    position:absolute;top:48%;right:-18%;width:40px;z-index:4;cursor:pointer;
    -webkit-tap-highlight-color:transparent;
  }
  .lever-stick{
    width:8px;height:60px;background:linear-gradient(90deg,#bbb,#ddd,#bbb);
    margin:0 auto;border-radius:4px;
    transition:transform .15s;transform-origin:bottom center;
  }
  .lever-knob{
    width:28px;height:28px;margin:0 auto;margin-top:-2px;
    background:radial-gradient(circle at 40% 35%,var(--coral),#e53935);
    border-radius:50%;box-shadow:0 3px 8px #e5393555;
    transition:transform .15s;
  }
  .lever-base{
    width:20px;height:10px;margin:0 auto;
    background:#999;border-radius:0 0 6px 6px;
  }
  .lever-area:active .lever-stick{transform:rotate(18deg)}
  .lever-area:active .lever-knob{transform:scale(.9)}
  .lever-area.pulled .lever-stick{transform:rotate(18deg)}
  .lever-area.pulled .lever-knob{transform:scale(.9)}

  .lever-hint{
    position:absolute;top:48%;right:-80px;
    font-size:.7rem;color:var(--coral);font-weight:600;
    animation:hintPulse 2s infinite;white-space:nowrap;
  }
  @keyframes hintPulse{0%,100%{opacity:1}50%{opacity:.4}}

  /* ===== FALLING CAPSULE ===== */
  .falling-capsule{
    position:absolute;top:30%;left:50%;transform:translateX(-50%);
    width:44px;height:56px;z-index:10;opacity:0;pointer-events:none;
  }
  .falling-capsule .cap-top{
    width:100%;height:55%;border-radius:50% 50% 0 0;
  }
  .falling-capsule .cap-bottom{
    width:100%;height:45%;border-radius:0 0 50% 50%;
    background:#ffffffcc;border:2px solid #00000011;border-top:none;
  }
  .falling-capsule .cap-top{border:2px solid #00000011;border-bottom:none}
  .falling-capsule .cap-shine{
    position:absolute;top:10%;left:18%;width:10px;height:10px;
    background:white;border-radius:50%;opacity:.7;
  }

  @keyframes dispenseCapsule{
    0%{top:25%;opacity:1;transform:translateX(-50%) rotate(0deg)}
    30%{top:55%;transform:translateX(-50%) rotate(-8deg)}
    60%{top:75%;transform:translateX(-50%) rotate(5deg)}
    80%{top:82%;transform:translateX(-50%) rotate(-3deg)}
    100%{top:88%;opacity:1;transform:translateX(-50%) rotate(0deg)}
  }

  /* ===== MESSAGE CARD ===== */
  .card-overlay{
    position:fixed;inset:0;background:#00000055;
    display:flex;align-items:center;justify-content:center;
    z-index:100;opacity:0;pointer-events:none;
    transition:opacity .4s;padding:1.5rem;
  }
  .card-overlay.show{opacity:1;pointer-events:auto}

  .message-card{
    background:var(--card-bg);border-radius:20px;padding:2rem 1.8rem;
    max-width:340px;width:100%;text-align:center;
    transform:scale(.7) rotate(-5deg);transition:transform .5s cubic-bezier(.34,1.56,.64,1);
    box-shadow:0 20px 60px #00000033;position:relative;
  }
  .card-overlay.show .message-card{transform:scale(1) rotate(0deg)}

  .message-card .card-emoji{font-size:2.5rem;margin-bottom:.8rem;display:block}
  .message-card .card-text{font-size:1.05rem;line-height:1.6;color:var(--text);font-weight:600}
  .message-card .card-num{
    font-size:.7rem;color:var(--text-light);margin-top:1rem;
    letter-spacing:.05em;
  }
  .btn-close-card{
    margin-top:1.2rem;background:none;border:2px solid var(--pink);
    color:var(--pink);border-radius:50px;padding:.5rem 1.5rem;
    font-family:inherit;font-size:.85rem;font-weight:700;cursor:pointer;
    transition:all .2s;
  }
  .btn-close-card:hover{background:var(--pink);color:white}

  /* ===== GOLDEN CARD ===== */
  .message-card.golden{
    background:linear-gradient(145deg,var(--gold-light),#fff9c4,var(--gold-light));
    border:3px solid var(--gold);
  }
  .message-card.golden::before{
    content:'';position:absolute;inset:-3px;border-radius:22px;
    background:linear-gradient(45deg,var(--gold),transparent,var(--gold),transparent);
    z-index:-1;animation:goldenGlow 3s infinite;
    filter:blur(8px);opacity:.5;
  }
  @keyframes goldenGlow{0%,100%{opacity:.3}50%{opacity:.7}}

  .btn-playlist{
    display:inline-block;margin-top:1.2rem;
    background:linear-gradient(135deg,#fc3c44,#d42a7b);
    color:white;text-decoration:none;border-radius:50px;
    padding:.8rem 2rem;font-family:inherit;font-size:1rem;font-weight:700;
    box-shadow:0 4px 20px #fc3c4444;transition:transform .2s;
  }
  .btn-playlist:active{transform:scale(.95)}

  .qr-section{margin-top:1rem}
  .qr-section img{width:140px;height:140px;border-radius:10px;margin-top:.5rem}
  .qr-section p{font-size:.75rem;color:var(--text-light);margin-top:.3rem}

  /* ===== CONFETTI ===== */
  .confetti-container{position:fixed;inset:0;pointer-events:none;z-index:200;overflow:hidden}
  .confetti-piece{
    position:absolute;width:10px;height:10px;top:-20px;
    animation:confettiFall linear forwards;
  }
  @keyframes confettiFall{
    0%{transform:translateY(0) rotate(0deg);opacity:1}
    100%{transform:translateY(110vh) rotate(720deg);opacity:0}
  }

  /* ===== FINAL SCREEN ===== */
  #final{z-index:50}
  #final h2{font-size:1.4rem;font-weight:700;margin-bottom:.5rem;text-align:center}
  #final p{font-size:.95rem;color:var(--text-light);text-align:center}
  .btn-replay{
    margin-top:1.5rem;background:none;border:2px solid var(--machine-body);
    color:var(--machine-body);border-radius:50px;padding:.6rem 1.5rem;
    font-family:inherit;font-size:.85rem;font-weight:700;cursor:pointer;
    transition:all .2s;
  }
  .btn-replay:hover{background:var(--machine-body);color:white}

  /* ===== UTILS ===== */
  .sparkle{
    position:absolute;font-size:.8rem;animation:sparklePop 1s forwards;pointer-events:none;
  }
  @keyframes sparklePop{
    0%{transform:scale(0) rotate(0);opacity:1}
    50%{transform:scale(1.2) rotate(180deg);opacity:1}
    100%{transform:scale(0) rotate(360deg);opacity:0}
  }

  /* Responsive */
  @media(max-width:360px){
    .machine-wrapper{width:220px}
    #welcome h1{font-size:1.3rem}
    .message-card{padding:1.5rem 1.2rem}
  }
  @media(min-height:750px){
    .machine-wrapper{width:280px}
  }
</style>
</head>
<body>

<!-- Background particles -->
<div class="bg-particles" id="bgParticles"></div>

<!-- ========== WELCOME SCREEN ========== -->
<div class="screen" id="welcome">
  <div class="emoji-top">🎰</div>
  <!-- ✏️ PERSONALIZA: Cambia el nombre aquí -->
  <h1>Hola mi amor 💕</h1>
  <p>Esta máquina tiene algo especial<br>preparado solo para ti...</p>
  <button class="btn-coin" onclick="startGame()">Insertar Moneda 🪙</button>
</div>

<!-- ========== GAME SCREEN ========== -->
<div class="screen hidden" id="game">
  <div class="counter" id="counter">Cápsula 1 de 6</div>

  <div class="machine-wrapper" id="machineWrapper">
    <!-- Dome -->
    <div class="dome" id="dome">
      <div class="dome-shine"></div>
    </div>

    <!-- Body -->
    <div class="machine-body">
      <div class="machine-label">✦ GACHA LOVE ✦</div>
    </div>

    <!-- Slot -->
    <div class="slot"><div class="slot-opening"></div></div>

    <!-- Lever -->
    <div class="lever-area" id="lever" onclick="pullLever()">
      <div class="lever-knob"></div>
      <div class="lever-stick"></div>
      <div class="lever-base"></div>
    </div>
    <div class="lever-hint" id="leverHint">← ¡Jala!</div>

    <!-- Falling capsule (animated) -->
    <div class="falling-capsule" id="fallingCapsule">
      <div class="cap-top"></div>
      <div class="cap-bottom"></div>
      <div class="cap-shine"></div>
    </div>
  </div>
</div>

<!-- ========== MESSAGE CARD OVERLAY ========== -->
<div class="card-overlay" id="cardOverlay">
  <div class="message-card" id="messageCard">
    <span class="card-emoji" id="cardEmoji">💊</span>
    <div class="card-text" id="cardText"></div>
    <div class="card-num" id="cardNum"></div>
    <!-- Regular close button -->
    <button class="btn-close-card" id="btnNext" onclick="closeCard()">Siguiente 💫</button>
    <!-- Golden content (hidden by default) -->
    <div id="goldenContent" style="display:none">
      <a class="btn-playlist" id="playlistLink" href="#" target="_blank">
        Escuchar Playlist 🎶
      </a>
      <div class="qr-section">
        <p>o escanea el código:</p>
        <img id="qrImage" src="" alt="QR Code">
      </div>
    </div>
  </div>
</div>

<!-- ========== FINAL SCREEN ========== -->
<div class="screen hidden" id="final">
  <h2>🤍 Eso es todo por ahora 🤍</h2>
  <p>Dale play y piensa en mí 🎵</p>
  <button class="btn-replay" onclick="replay()">Volver a jugar 🔄</button>
</div>

<!-- Confetti container -->
<div class="confetti-container" id="confettiContainer"></div>

<script>
// ============================================================
//  ✏️ PERSONALIZA AQUÍ - Cambia los mensajes y el link
// ============================================================

const PLAYLIST_URL = "https://music.apple.com/co/playlist/pl.u-6mo4l1yuK1Mbz7X?l=en"; // ← PON TU LINK AQUÍ

const CAPSULES = [
  {
    emoji: "💜",
    text: "La primera vez que te vi, supe que eras especial. Algo en ti me atrapó al instante y tus ojos me enamoraron.",
    color: "#ce93d8"  // lilac
  },
  {
    emoji: "😂",
    text: "Valiste cada esfuerzo que hice para que fueras feliz... conmigo.",
    color: "#f48fb1"  // pink
  },
  {
    emoji: "🌈",
    text: "Contigo los días grises se vuelven de colores. Eres mi lugar seguro.",
    color: "#81d4fa"  // sky
  },
  {
    emoji: "🌍",
    text: "Eres mi persona favorita en todo este mundo. No te cambio por nada.",
    color: "#80cbc4"  // mint
  },
  {
    emoji: "🎵",
    text: "Cada canción bonita me recuerda a ti... así que hice algo especial.",
    color: "#ff8a80"  // coral
  },
  {
    // THE GOLDEN CAPSULE — final reveal
    emoji: "🎧",
    text: "Hice esta playlist pensando en ti y en nosotros. Cada canción tiene un pedacito de lo que siento.\n\nDale play. 🤍",
    color: "#ffd54f", // gold
    golden: true
  }
];

// ============================================================
//  STATE
// ============================================================
let currentCapsule = 0;
let isAnimating = false;

// ============================================================
//  BACKGROUND PARTICLES
// ============================================================
function createParticles(){
  const container = document.getElementById('bgParticles');
  const emojis = ['♡','✦','♪','⋆','✧','🎵','💕','⭐'];
  for(let i = 0; i < 20; i++){
    const span = document.createElement('span');
    span.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    span.style.left = Math.random()*100 + '%';
    span.style.animationDuration = (8 + Math.random()*12) + 's';
    span.style.animationDelay = Math.random()*10 + 's';
    span.style.fontSize = (.6 + Math.random()*.8) + 'rem';
    container.appendChild(span);
  }
}

// ============================================================
//  MINI CAPSULES IN DOME
// ============================================================
function createMiniCapsules(){
  const dome = document.getElementById('dome');
  const positions = [
    {top:'55%',left:'18%'},{top:'60%',left:'45%'},{top:'58%',left:'70%'},
    {top:'40%',left:'30%'},{top:'42%',left:'58%'},{top:'35%',left:'45%'}
  ];
  positions.forEach((pos,i) => {
    const el = document.createElement('div');
    el.className = 'mini-capsule';
    el.id = 'mini-'+i;
    el.style.top = pos.top;
    el.style.left = pos.left;
    el.style.background = CAPSULES[i].color;
    dome.appendChild(el);
  });
}

// ============================================================
//  START GAME
// ============================================================
function startGame(){
  document.getElementById('welcome').classList.add('hidden');
  setTimeout(()=>{
    document.getElementById('game').classList.remove('hidden');
  },300);
}

// ============================================================
//  PULL LEVER
// ============================================================
function pullLever(){
  if(isAnimating || currentCapsule >= CAPSULES.length) return;
  isAnimating = true;

  const lever = document.getElementById('lever');
  const hint = document.getElementById('leverHint');
  hint.style.display = 'none';

  // Lever animation
  lever.classList.add('pulled');
  setTimeout(()=> lever.classList.remove('pulled'), 300);

  // Dispense capsule
  const capsule = CAPSULES[currentCapsule];
  const falling = document.getElementById('fallingCapsule');
  const capTop = falling.querySelector('.cap-top');
  capTop.style.background = capsule.golden
    ? 'linear-gradient(135deg, #ffd54f, #ffb300, #ffd54f)'
    : capsule.color;

  falling.style.opacity = '0';
  falling.style.animation = 'none';
  // Force reflow
  void falling.offsetWidth;
  falling.style.opacity = '1';
  falling.style.animation = 'dispenseCapsule .9s cubic-bezier(.22,.68,.36,1) forwards';

  // Mark mini capsule as collected
  const mini = document.getElementById('mini-'+currentCapsule);
  if(mini) mini.classList.add('collected');

  // Show card after capsule falls
  setTimeout(()=>{
    falling.style.opacity = '0';
    falling.style.animation = 'none';
    showCard(currentCapsule);
  }, 1000);
}

// ============================================================
//  SHOW MESSAGE CARD
// ============================================================
function showCard(index){
  const capsule = CAPSULES[index];
  const overlay = document.getElementById('cardOverlay');
  const card = document.getElementById('messageCard');
  const emoji = document.getElementById('cardEmoji');
  const text = document.getElementById('cardText');
  const num = document.getElementById('cardNum');
  const btnNext = document.getElementById('btnNext');
  const goldenContent = document.getElementById('goldenContent');

  emoji.textContent = capsule.emoji;
  text.innerHTML = capsule.text.replace(/\n/g,'<br>');
  num.textContent = `Cápsula ${index+1} de ${CAPSULES.length}`;

  if(capsule.golden){
    card.classList.add('golden');
    btnNext.style.display = 'none';
    goldenContent.style.display = 'block';
    document.getElementById('playlistLink').href = PLAYLIST_URL;
    // QR code via external API (works when hosted)
    document.getElementById('qrImage').src =
      'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' +
      encodeURIComponent(PLAYLIST_URL);
    // Launch confetti
    setTimeout(launchConfetti, 400);
  } else {
    card.classList.remove('golden');
    btnNext.style.display = 'inline-block';
    goldenContent.style.display = 'none';
    if(index === CAPSULES.length - 2){
      btnNext.textContent = 'Última cápsula... ✨';
    } else {
      btnNext.textContent = 'Siguiente 💫';
    }
  }

  overlay.classList.add('show');
}

// ============================================================
//  CLOSE CARD
// ============================================================
function closeCard(){
  const overlay = document.getElementById('cardOverlay');
  overlay.classList.remove('show');
  currentCapsule++;
  document.getElementById('counter').textContent =
    `Cápsula ${Math.min(currentCapsule+1, CAPSULES.length)} de ${CAPSULES.length}`;
  isAnimating = false;
}

// ============================================================
//  CONFETTI
// ============================================================
function launchConfetti(){
  const container = document.getElementById('confettiContainer');
  const colors = ['#f48fb1','#ce93d8','#ffd54f','#80cbc4','#ff8a80','#81d4fa','#fff176'];
  for(let i = 0; i < 80; i++){
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random()*100 + '%';
    piece.style.background = colors[Math.floor(Math.random()*colors.length)];
    piece.style.width = (6 + Math.random()*8) + 'px';
    piece.style.height = (6 + Math.random()*8) + 'px';
    piece.style.borderRadius = Math.random() > .5 ? '50%' : '2px';
    piece.style.animationDuration = (2 + Math.random()*3) + 's';
    piece.style.animationDelay = Math.random()*1.5 + 's';
    container.appendChild(piece);
  }
  // Cleanup
  setTimeout(()=>{ container.innerHTML = ''; }, 6000);
}

// ============================================================
//  REPLAY
// ============================================================
function replay(){
  currentCapsule = 0;
  isAnimating = false;
  document.getElementById('counter').textContent = 'Cápsula 1 de 6';
  document.querySelectorAll('.mini-capsule').forEach(el => el.classList.remove('collected'));
  document.getElementById('cardOverlay').classList.remove('show');
  document.getElementById('final').classList.add('hidden');
  document.getElementById('game').classList.add('hidden');
  document.getElementById('welcome').classList.remove('hidden');
  document.getElementById('leverHint').style.display = '';
}

// ============================================================
//  INIT
// ============================================================
createParticles();
createMiniCapsules();
</script>
</body>
</html>
